<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
/* --- HACKER VIBE THEME (NO ANIMATIONS, OPTIMIZED) --- */
:root {
  --bg: #0c0f0c;
  --bg-darker: #070907;
  --header-bg: #111511;
  --border: #1f3a1f;
  --border-light: #2f5a2f;
  --text: #b3ffb3;
  --text-muted: #6f9f6f;
  --accent: #00ff00; /* Matrix green */
  --accent-hover: #33ff33;
  --accent-pressed: #00cc00;
  --glow: rgba(0, 255, 0, 0.15);
  --font-mono: 'Courier New', 'SF Mono', 'Monaco', 'Consolas', monospace;
  --font-sans: 'Courier New', 'Menlo', 'Courier', monospace;

  /* Firefox ESR optimized scrollbars */
  scrollbar-width: thin;
  scrollbar-color: #2f5a2f #0a0e0a;
}

* {
  box-sizing: border-box;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-mono);
  margin: 0;
  font-size: 12px;
  line-height: 1.5;
  overflow-x: hidden;
}

/* Subtle static effect instead of animation */
body::before {
  content: " ";
  display: block;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: radial-gradient(circle at 50% 50%, rgba(0, 255, 0, 0.02) 0%, transparent 80%);
  pointer-events: none;
  z-index: 9999;
}

/* Simple scrollbar for WebKit */
::-webkit-scrollbar {
  width: 10px;
  height: 10px;
}

::-webkit-scrollbar-track {
  background: var(--bg-darker);
  border: 1px solid var(--border);
}

::-webkit-scrollbar-thumb {
  background: var(--accent);
  border: 1px solid var(--border-light);
}

::-webkit-scrollbar-thumb:hover {
  background: var(--accent-hover);
}

section {
  border-bottom: 1px solid var(--border);
  padding: 10px;
}

.title {
  color: var(--accent);
  font-weight: bold;
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  gap: 4px;
  border-bottom: 1px solid var(--border);
  padding-bottom: 4px;
}

.title::before {
  content: '$>';
  font-size: 11px;
  color: var(--text-muted);
  margin-right: 4px;
}

/* --- HACKER EDITOR --- */
.editor-container {
  position: relative;
  width: 100%;
  background: var(--bg-darker);
  border: 1px solid var(--border);
  margin-bottom: 8px;
  overflow: hidden;
}

#payload, #highlighting {
  margin: 0;
  padding: 10px;
  width: 100%;
  font-family: var(--font-mono);
  font-size: 12px;
  line-height: 1.5;
  white-space: pre-wrap;
  word-wrap: break-word;
  min-height: 100px;
  max-height: 300px;
  overflow-y: auto;
  tab-size: 4;
}

#payload {
  position: relative;
  z-index: 2;
  background: transparent;
  color: transparent;
  caret-color: var(--accent);
  border: none;
  outline: none;
  resize: vertical;
  display: block;
}

#payload:focus {
  outline: 1px solid var(--accent);
  outline-offset: -1px;
  background: rgba(0, 255, 0, 0.02);
}

#highlighting {
  position: absolute;
  top: 0;
  left: 0;
  z-index: 1;
  color: var(--text);
  pointer-events: none;
  background: var(--bg-darker);
}

/* --- HACKER BUTTONS (NO ANIMATIONS) --- */
button {
  background: var(--bg-darker);
  color: var(--accent);
  border: 1px solid var(--border);
  padding: 5px 10px;
  margin: 2px;
  cursor: pointer;
  font-family: var(--font-mono);
  font-size: 11px;
  font-weight: bold;
  min-width: 60px;
  text-transform: uppercase;
  letter-spacing: 1px;
}

button:hover {
  background: var(--bg);
  border-color: var(--accent);
  color: var(--accent-hover);
}

button:active {
  background: var(--accent);
  color: var(--bg-darker);
  border-color: var(--accent-hover);
}

button:focus {
  outline: 1px solid var(--accent);
}

#injectBtn {
  background: var(--accent);
  border: 1px solid var(--accent-hover);
  color: var(--bg-darker);
  font-weight: bold;
  padding: 8px;
  margin: 0;
  width: 100%;
  text-transform: uppercase;
  letter-spacing: 2px;
  font-size: 12px;
}

#injectBtn:hover {
  background: var(--accent-hover);
  border-color: var(--accent);
}

#injectBtn:active {
  background: var(--accent-pressed);
}

/* --- HACKER BADGES (NO ANIMATIONS) --- */
.badge {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  background: var(--bg-darker);
  border: 1px solid var(--border);
  padding: 3px 8px;
  margin: 3px;
  cursor: pointer;
  font-family: var(--font-mono);
  font-size: 11px;
  height: 24px;
  text-transform: uppercase;
  letter-spacing: 1px;
  position: relative;
}

/* Simple brackets instead of pseudo-elements with content */
.badge {
  padding-left: 12px;
  padding-right: 12px;
}

.badge:hover {
  background: var(--bg);
  border-color: var(--accent);
  color: var(--accent-hover);
}

.badge:active {
  background: var(--accent);
  color: var(--bg-darker);
  border-color: var(--accent-hover);
}

.active {
  background: var(--accent) !important;
  border-color: var(--accent-hover) !important;
  color: var(--bg-darker) !important;
}

/* Grid System */
.grid-container {
  display: grid;
  grid-template-columns: 1fr;
  gap: 1px;
  background: var(--bg-darker);
}

/* Transform Buttons - Just colors, no effects */
#urlCode {
  color: #ffff00;
  border-left: 3px solid #ffff00;
}
#base64 {
  color: #00ffff;
  border-left: 3px solid #00ffff;
}
#hexCode {
  color: #ff00ff;
  border-left: 3px solid #ff00ff;
}
#htmlcode {
  color: #ff8800;
  border-left: 3px solid #ff8800;
}

/* Bypass Badges */
.badge.bypass {
  color: #ffaa00;
  border-color: #4a3a1a;
}

.badge.bypass:hover {
  border-color: #ffaa00;
}

/* Mode Badge Colors */
#modeBox .badge[data-mode="xss"] {
  color: #ff7b7b;
  border-color: #4a2a2a;
}
#modeBox .badge[data-mode="sqli"] {
  color: #7bc5ff;
  border-color: #2a3a4a;
}
#modeBox .badge[data-mode="cmd"] {
  color: #ff9f7b;
  border-color: #4a3a2a;
}
#modeBox .badge[data-mode="ssti"] {
  color: #cb7bff;
  border-color: #3a2a4a;
}
#modeBox .badge[data-mode="lfi"] {
  color: #7bff9f;
  border-color: #2a4a2a;
}
#modeBox .badge[data-mode="redirect"] {
  color: #ffdb7b;
  border-color: #4a4a2a;
}

/* Type Badges */
#typeBox .badge {
  background: var(--bg);
  padding: 2px 6px;
  font-size: 10px;
  height: 20px;
}

/* Payload Badges */
#payloadBox .badge {
  display: block;  /* Changed from inline-block to block */
  background: var(--bg-darker);
  padding: 8px 12px;  /* Slightly increased padding for better vertical spacing */
  margin: 6px 0;  /* Changed margin to only vertical (top/bottom) */
  font-size: 11px;
  word-break: break-all;
  height: auto;
  min-height: 32px;  /* Slightly increased for better touch target */
  white-space: normal;
  border-left: 3px solid var(--accent);
  border-radius: 0;
  width: 100%;  /* Ensure full width */
  box-sizing: border-box;  /* Include padding in width calculation */
}

/* Optional: Add a subtle hover effect that works well with vertical layout */
#payloadBox .badge:hover {
  background: var(--bg);
  border-left-width: 4px;
  transform: translateX(2px);  /* Slight shift right on hover for visual feedback */
}

#payloadBox .badge:hover {
  background: var(--bg);
  border-left-width: 4px;
}

/* Syntax Highlighting */
.token-string { color: #ffff99; }
.token-keyword { color: #ff99ff; font-weight: bold; }
.token-tag { color: #99ff99; }
.token-attr { color: #ffaa66; }
.token-comment { color: #6f9f6f; font-style: italic; }
.token-number { color: #99ffff; }

/* Loading State */
.loading {
  color: var(--text-muted);
  text-align: center;
  padding: 20px;
  border: 1px dashed var(--border);
}

/* Error State */
.error {
  color: #ff6b6b;
  text-align: center;
  padding: 20px;
  background: rgba(255, 68, 68, 0.05);
  border: 1px solid #ff6b6b;
}

/* No special cursor for titles */
[title] {
  cursor: default;
}

/* Simple responsive */
@media (max-width: 600px) {
  button {
    width: calc(50% - 6px);
  }

  .badge {
    font-size: 10px;
    padding: 2px 5px;
  }
}

/* Focus indicator - simple */
:focus-visible {
  outline: 2px solid var(--accent);
  outline-offset: 1px;
}

/* Firefox ESR specific */
@-moz-document url-prefix() {
  button, .badge {
    border-width: 1px;
  }

  #payload, #highlighting {
    scrollbar-width: thin;
  }
}

/* Static footer */
.footer-hint {
  padding: 6px 12px;
  color: var(--text-muted);
  font-size: 9px;
  border-top: 1px solid var(--border);
  text-align: right;
  font-family: var(--font-mono);
  text-transform: uppercase;
  letter-spacing: 1px;
}

.footer-hint span {
  border: 1px solid var(--border);
  padding: 2px 6px;
  background: var(--bg-darker);
}

/* Load More Button */
.load-more-btn {
  width: 100%;
  margin-top: 15px;
  margin-bottom: 5px;
  padding: 10px;
  background: var(--accent);
  color: var(--bg-darker);
  border: none;
  border-radius: 4px;
  cursor: pointer;
  font-weight: bold;
  font-size: 12px;
  text-transform: uppercase;
  letter-spacing: 1px;
  transition: opacity 0.2s;
}

.load-more-btn:hover {
  opacity: 0.9;
  background: var(--accent-hover);
}

.load-more-btn:disabled {
  opacity: 0.5;
  cursor: wait;
}

/* Search Box */
.search-box {
  margin-bottom: 12px;
  position: sticky;
  top: 0;
  background: var(--bg-darker);
  padding: 8px 5px;
  z-index: 10;
  border-bottom: 1px solid var(--border);
}

.search-input {
  width: 100%;
  padding: 8px;
  background: var(--bg);
  border: 1px solid var(--border);
  color: var(--text);
  font-family: var(--font-mono);
  border-radius: 4px;
  box-sizing: border-box;
  font-size: 12px;
}

.search-input:focus {
  outline: 1px solid var(--accent);
  border-color: var(--accent);
}

/* Count Info */
.count-info {
  font-size: 11px;
  color: var(--text-muted);
  margin-bottom: 8px;
  padding: 4px 8px;
  background: var(--bg-darker);
  border-radius: 4px;
  text-align: center;
  border: 1px solid var(--border);
}

/* End Message */
.end-message {
  text-align: center;
  padding: 15px;
  margin-top: 10px;
  color: var(--text-muted);
  font-size: 12px;
  border-top: 1px dashed var(--border);
}

/* Highlight Search Term */
.search-highlight {
  background: #ffd700;
  color: #000;
  padding: 2px 0;
  font-weight: bold;
}
</style>
</head>
<body>

<section style="background: var(--header-bg);">
  <div class="title">Payload Injection</div>
  <div class="editor-container">
    <div id="highlighting" aria-hidden="true"></div>
    <textarea
      id="payload"
      placeholder=">_ Enter payload or select from library..."
      spellcheck="false"
      title="Enter your payload here"
      aria-label="Payload input field"
    ></textarea>
  </div>
  <button
    id="injectBtn"
    title="Inject payload into current page"
    aria-label="Inject payload"
  >INJECT TO TARGET</button>
</section>

<div class="grid-container">
  <section>
    <div class="title">Transforms</div>
    <button id="urlCode" title="URL Encode/Decode selected text">URL</button>
    <button id="base64" title="Base64 Encode/Decode selected text">B64</button>
    <button id="hexCode" title="Hex Encode/Decode selected text">HEX</button>
    <button id="htmlcode" title="HTML Encode/Decode selected text">HTML</button>
  </section>

<!--  <section>
    <div class="title">Bypass</div>
    <div id="bypass" aria-label="Common bypass characters"></div>
  </section>-->

  <section>
    <div class="title">Payload Library</div>
    <div id="modeBox" aria-label="Payload categories"></div>
    <div id="typeBox" style="margin-top:8px;" aria-label="Payload types"></div>
    <div id="payloadBox" style="margin-top:12px; border-top: 1px solid var(--border); padding-top: 12px;" aria-label="Available payloads"></div>
  </section>
</div>

<!-- Static footer -->
<div class="footer-hint">
  <span>CTRL+ENTER TO INJECT | TAB TO NAVIGATE</span>
</div>

<script src="panel.js"></script>
</body>
</html>
